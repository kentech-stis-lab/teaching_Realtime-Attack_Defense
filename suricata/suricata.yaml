%YAML 1.1
---

vars:
  address-groups:
    HOME_NET: "[172.20.0.0/24,172.20.1.0/24]"
    EXTERNAL_NET: "!$HOME_NET"
    HTTP_SERVERS: "$HOME_NET"
    SQL_SERVERS: "$HOME_NET"
    DNS_SERVERS: "$HOME_NET"
    TELNET_SERVERS: "$HOME_NET"
    AIM_SERVERS: "$EXTERNAL_NET"
    DC_SERVERS: "$HOME_NET"
    DNP3_SERVER: "$HOME_NET"
    DNP3_CLIENT: "$HOME_NET"
    MODBUS_CLIENT: "$HOME_NET"
    MODBUS_SERVER: "$HOME_NET"
    ENIP_CLIENT: "$HOME_NET"
    ENIP_SERVER: "$HOME_NET"

  port-groups:
    HTTP_PORTS: "80"
    SHELLCODE_PORTS: "!80"
    ORACLE_PORTS: 1521
    SSH_PORTS: 2222
    DNP3_PORTS: 20000
    MODBUS_PORTS: 502
    FILE_DATA_PORTS: "[$HTTP_PORTS,110,143]"
    FTP_PORTS: 21
    GENEVE_PORTS: 6081
    VXLAN_PORTS: 4789
    TEREDO_PORTS: 3544

default-log-dir: /var/log/suricata/

# Memory limits for low-resource environments
stream:
  memcap: 32mb
  prealloc-sessions: 1024

flow:
  memcap: 32mb

host:
  memcap: 16mb

outputs:
  - eve-log:
      enabled: yes
      filetype: regular
      filename: eve.json
      types:
        - alert:
            payload-printable: yes
            http-body-printable: yes
        - http:
            extended: yes
        - stats:
            totals: yes
            threads: no

  - fast:
      enabled: yes
      filename: fast.log
      append: yes

af-packet:
  - interface: eth0
    threads: 1
    cluster-id: 99
    cluster-type: cluster_flow
    defrag: yes

app-layer:
  protocols:
    http:
      enabled: yes
    ftp:
      enabled: yes
    ssh:
      enabled: yes
    tls:
      enabled: no
    dns:
      tcp:
        enabled: no
      udp:
        enabled: no

threading:
  set-cpu-affinity: no
  detect-thread-ratio: 1.0

default-rule-path: /etc/suricata/rules

rule-files:
  - local.rules
